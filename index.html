<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - RS Tipe C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-light p-4">
<div class="container bg-white p-4 rounded shadow">
    <h2 class="text-success text-center">Dashboard Admin Jadwal Dokter</h2>
    <hr>
    <form id="docForm" class="row g-3 p-3 border rounded bg-light mb-4">
        <input type="hidden" id="rowId">
        <div class="col-md-4"><label>Nama Dokter</label><input type="text" id="NamaDokter" class="form-control" list="listDokter" required><datalist id="listDokter"></datalist></div>
        <div class="col-md-4"><label>Spesialisasi</label><input type="text" id="Spesialisasi" class="form-control" list="listSpec" required><datalist id="listSpec"></datalist></div>
        <div class="col-md-4"><label>Layanan</label><select id="Layanan" class="form-control" required><option value="BPJS">BPJS</option><option value="Eksekutif">Eksekutif</option><option value="BPJS, Eksekutif">Keduanya</option></select></div>
        <div class="col-md-3"><label>Tipe Jadwal</label><select id="TipeJadwal" class="form-control" onchange="toggleDates()"><option value="Permanen">Permanen</option><option value="Sementara">Sementara</option></select></div>
        <div class="col-md-3 date-f d-none"><label>Dari</label><input type="text" id="BerlakuDari" class="form-control"></div>
        <div class="col-md-3 date-f d-none"><label>Hingga</label><input type="text" id="BerlakuHingga" class="form-control"></div>
        <div class="col-md-3"><label>Hari</label><select id="Hari" class="form-control"><option value="1. Monday">Senin</option><option value="2. Tuesday">Selasa</option><option value="3. Wednesday">Rabu</option><option value="4. Thursday">Kamis</option><option value="5. Friday">Jumat</option><option value="6. Saturday">Sabtu</option></select></div>
        <div class="col-md-3"><label>Jam (Klik untuk Animasi)</label><input type="text" id="Jam" class="form-control" placeholder="08:00"></div>
        <div class="col-md-3"><label>Status</label><select id="Status" class="form-control"><option value="">Aktif</option><option value="Tidak Praktek">Tidak Praktek</option></select></div>
        <div class="col-md-6"><label>Keterangan</label><input type="text" id="Keterangan" class="form-control"></div>
        <div class="col-12"><button type="submit" class="btn btn-primary w-100">Simpan Data</button></div>
    </form>
    <div id="loading" class="text-center d-none">Memproses...</div>
    <div class="table-responsive"><table class="table table-hover">
        <thead class="table-dark"><tr><th>Dokter</th><th>Layanan</th><th>Hari</th><th>Tipe</th><th>Aksi</th></tr></thead>
        <tbody id="adminTable"></tbody>
    </table></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const API = 'MASUKKAN_URL_WEB_APP_ANDA_DISINI';
    let dataJadwal = [];

    flatpickr("#Jam", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
    flatpickr("#BerlakuDari, #BerlakuHingga", { dateFormat: "Y-m-d" });

    function toggleDates() { const isT = document.getElementById('TipeJadwal').value === 'Sementara'; document.querySelectorAll('.date-f').forEach(e => e.classList.toggle('d-none', !isT)); }

    async function refresh() {
        const res = await fetch(API + '?view=admin');
        const json = await res.json();
        dataJadwal = json.jadwal;
        
        document.getElementById('listDokter').innerHTML = json.master.map(m => `<option value="${m.nama}">`).join('');
        document.getElementById('listSpec').innerHTML = [...new Set(json.master.map(m => m.spec))].map(s => `<option value="${s}">`).join('');

        const tb = document.getElementById('adminTable'); tb.innerHTML = '';
        dataJadwal.forEach(d => {
            tb.innerHTML += `<tr><td><b>${d.NamaDokter}</b><br><small>${d.Spesialisasi}</small></td><td>${d.Layanan}</td><td>${d.Hari}</td><td>${d.TipeJadwal}</td><td><button class="btn btn-sm btn-warning" onclick="editData(${d.rowId})">Edit</button> <button class="btn btn-sm btn-danger" onclick="delData(${d.rowId})">Hapus</button></td></tr>`;
        });
    }

    document.getElementById('docForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loading').classList.remove('d-none');
        const p = { 
            action: document.getElementById('rowId').value ? 'update' : 'add', 
            rowId: document.getElementById('rowId').value, 
            NamaDokter: document.getElementById('NamaDokter').value, 
            Spesialisasi: document.getElementById('Spesialisasi').value, 
            Layanan: document.getElementById('Layanan').value, 
            Hari: document.getElementById('Hari').value, 
            Jam: document.getElementById('Jam').value, 
            Status: document.getElementById('Status').value, 
            Keterangan: document.getElementById('Keterangan').value, 
            TipeJadwal: document.getElementById('TipeJadwal').value, 
            BerlakuDari: document.getElementById('BerlakuDari').value, 
            BerlakuHingga: document.getElementById('BerlakuHingga').value 
        };
        await fetch(API, {method:'POST', body: JSON.stringify(p)});
        location.reload();
    };

    function editData(id) {
        const d = dataJadwal.find(x => x.rowId === id);
        document.getElementById('rowId').value = d.rowId;
        document.getElementById('NamaDokter').value = d.NamaDokter;
        document.getElementById('Spesialisasi').value = d.Spesialisasi;
        document.getElementById('Layanan').value = d.Layanan;
        document.getElementById('TipeJadwal').value = d.TipeJadwal;
        toggleDates();
        window.scrollTo(0,0);
    }

    async function delData(id) { if(confirm('Hapus?')) { await fetch(API, {method:'POST', body: JSON.stringify({action:'delete', rowId:id})}); refresh(); } }
    refresh();
</script>
</body>
</html>
