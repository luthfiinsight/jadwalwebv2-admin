<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - Luthfi INA-CBG Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-light p-4">
<div class="container bg-white p-4 rounded shadow">
    <h2 class="text-success text-center">Dashboard Admin Jadwal Dokter</h2>
    <hr>
    <form id="docForm" class="row g-3 p-3 border rounded bg-light mb-4">
        <input type="hidden" id="rowId">
        <div class="col-md-4"><label>Nama Dokter</label><input type="text" id="NamaDokter" class="form-control" list="listD" required><datalist id="listD"></datalist></div>
        <div class="col-md-4"><label>Spesialisasi</label><input type="text" id="Spec" class="form-control" list="listS" required><datalist id="listS"></datalist></div>
        <div class="col-md-4"><label>Layanan</label><select id="Layanan" class="form-control" required><option value="BPJS">BPJS</option><option value="Eksekutif">Eksekutif</option><option value="BPJS, Eksekutif">Keduanya</option></select></div>
        <div class="col-md-3"><label>Tipe Jadwal</label><select id="Tipe" class="form-control" onchange="toggleD()"><option value="Permanen">Permanen</option><option value="Sementara">Sementara</option></select></div>
        <div class="col-md-3 d-f d-none"><label>Dari</label><input type="text" id="Dari" class="form-control"></div>
        <div class="col-md-3 d-f d-none"><label>Hingga</label><input type="text" id="Hingga" class="form-control"></div>
        <div class="col-md-3"><label>Hari</label><select id="Hari" class="form-control"><option value="1. Monday">Senin</option><option value="2. Tuesday">Selasa</option><option value="3. Wednesday">Rabu</option><option value="4. Thursday">Kamis</option><option value="5. Friday">Jumat</option><option value="6. Saturday">Sabtu</option></select></div>
        <div class="col-md-4"><label>Jam Praktik</label><div class="input-group"><input type="text" id="JM" class="form-control" placeholder="08:00"><span class="input-group-text">s/d</span><input type="text" id="JS" class="form-control" placeholder="12:00"></div></div>
        <div class="col-md-3"><label>Status</label><select id="Status" class="form-control"><option value="">Aktif</option><option value="Tidak Praktek">Tidak Praktek</option></select></div>
        <div class="col-md-5"><label>Keterangan</label><input type="text" id="Ket" class="form-control"></div>
        <div class="col-12"><button type="submit" class="btn btn-primary w-100">Simpan Data</button></div>
    </form>
    <div class="table-responsive"><table class="table table-hover">
        <thead class="table-dark"><tr><th>Dokter</th><th>Layanan</th><th>Hari/Jam</th><th>Tipe</th><th>Aksi</th></tr></thead>
        <tbody id="adminTable"></tbody>
    </table></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const API = 'https://script.google.com/macros/s/AKfycbzVaWjbLSUld2OzC8jKhnaKCuKd_8sAeKhZjLhUUrV82tdYHNIyKtMkJiUBvj0zKYd_xQ/exec';
    let dataJ = [];
    flatpickr("#JM, #JS", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
    flatpickr("#Dari, #Hingga", { dateFormat: "Y-m-d" });
    function toggleD() { const isT = document.getElementById('Tipe').value === 'Sementara'; document.querySelectorAll('.d-f').forEach(e => e.classList.toggle('d-none', !isT)); }
    async function refresh() {
        const res = await fetch(API + '?view=admin'); const json = await res.json();
        dataJ = json.jadwal;
        document.getElementById('listD').innerHTML = json.master.map(m => `<option value="${m.nama}">`).join('');
        document.getElementById('listS').innerHTML = [...new Set(json.master.map(m => m.spec))].map(s => `<option value="${s}">`).join('');
        document.getElementById('NamaDokter').addEventListener('change', function() { const f = json.master.find(m => m.nama === this.value); if(f) document.getElementById('Spec').value = f.spec; });
        const tb = document.getElementById('adminTable'); tb.innerHTML = '';
        dataJ.forEach(d => { tb.innerHTML += `<tr><td><b>${d.NamaDokter}</b><br><small>${d.Spesialisasi}</small></td><td>${d.Layanan}</td><td>${d.Hari}<br>${d.Jam}</td><td>${d.TipeJadwal}</td><td><button class="btn btn-sm btn-warning" onclick="editData(${d.rowId})">Edit</button> <button class="btn btn-sm btn-danger" onclick="delData(${d.rowId})">Hapus</button></td></tr>`; });
    }
    document.getElementById('docForm').onsubmit = async (e) => {
        e.preventDefault();
        const j = `${document.getElementById('JM').value} - ${document.getElementById('JS').value}`;
        const p = { action: document.getElementById('rowId').value ? 'update' : 'add', rowId: document.getElementById('rowId').value, NamaDokter: document.getElementById('NamaDokter').value, Spesialisasi: document.getElementById('Spec').value, Layanan: document.getElementById('Layanan').value, Hari: document.getElementById('Hari').value, Jam: j, Status: document.getElementById('Status').value, Keterangan: document.getElementById('Ket').value, TipeJadwal: document.getElementById('Tipe').value, BerlakuDari: document.getElementById('Dari').value, BerlakuHingga: document.getElementById('Hingga').value };
        await fetch(API, {method:'POST', body: JSON.stringify(p)}); location.reload();
    };
    function editData(id) { const d = dataJ.find(x => x.rowId === id); document.getElementById('rowId').value = d.rowId; document.getElementById('NamaDokter').value = d.NamaDokter; document.getElementById('Spec').value = d.Spesialisasi; if(d.Jam.includes(" - ")) { const p = d.Jam.split(" - "); document.getElementById('JM').value = p[0]; document.getElementById('JS').value = p[1]; } toggleD(); window.scrollTo(0,0); }
    async function delData(id) { if(confirm('Hapus?')) { await fetch(API, {method:'POST', body: JSON.stringify({action:'delete', rowId:id})}); refresh(); } }
    refresh();
</script>
</body>
</html>
